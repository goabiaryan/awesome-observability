receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024
  
  memory_limiter:
    check_interval: 1s
    limit_mib: 1024
    spike_limit_mib: 256
  
  tail_sampling:
    policies:
      - name: error_traces
        type: error_rate
        error_rate:
          threshold_percentage: 5
      
      - name: slow_traces
        type: latency
        latency:
          threshold_ms: 1000
      
      - name: always_sample
        type: always_sample

exporters:
  clickhouse:
    datasource: tcp://clickhouse:9000
    database: signoz
    logs_table_name: logs
    traces_table_name: traces
    metrics_table_name: metrics

extensions:
  health_check:
    endpoint: :13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, tail_sampling]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
